<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dinner Plan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <div class="app-container">
        <header>
            <div id="month-label">April 2026</div>
            <div class="date-strip" id="date-strip">
                </div>
        </header>

        <main id="calendar-container">
            <div id="calendar-wrapper">
                </div>
        </main>

        <nav class="bottom-nav">
            <div class="week-controls">
                <button onclick="moveWeek(-7)">← Prev Week</button>
                <button onclick="moveWeek(7)">Next Week →</button>
            </div>
            <button class="manage-btn" onclick="openMealEditor()">Manage Master Meal List</button>
        </nav>
    </div>

    <div id="meal-modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Manage Meals</h3>
                <button onclick="closeMealEditor()" class="close-modal-btn">Done</button>
            </header>
            <div id="meal-list-edit">
                </div>
        </div>
    </div>

    <datalist id="meal-options"></datalist>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
