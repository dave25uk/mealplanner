<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dinner Plan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <button class="nav-arrow" onclick="moveWeek(-7)">‹</button>
                <div id="month-label"></div>
                <button class="nav-arrow" onclick="moveWeek(7)">›</button>
            </div>
            <div class="date-strip" id="date-strip"></div>
        </header>

        <main id="calendar-container">
            <div id="calendar-wrapper"></div>
        </main>

        <nav class="bottom-nav">
            <button class="manage-btn" onclick="openMealEditor()">Edit Meals</button>
        </nav>
    </div>

    <div id="picker-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="picker-date-label">Select Meal</h3>
                <button onclick="closePicker()" class="close-modal-btn grey">Cancel</button>
            </div>
            <div id="meal-selection-list"></div>
        </div>
    </div>

    <div id="meal-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Meals</h3>
                <button onclick="closeMealEditor()" class="close-modal-btn">Done</button>
            </div>
            <div id="meal-list-edit"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
